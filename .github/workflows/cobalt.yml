name: Deploy Cobalt

on:
  push:
    branches: ["main"]

  workflow_dispatch:

  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Cobalt Repository
        uses: actions/checkout@v4
        with:
          repository: imputnet/cobalt

      - uses: oven-sh/setup-bun@v2
      
      - name: Install Root Dependencies
        run: bun install --ignore-scripts

      - name: Patch Configuration Files
        working-directory: ./web
        run: |
          sed -i 's|https://api.cobalt.tools|https://cobalt-api.jacob.com.hk|g' src/lib/env.ts
          
          sed -i 's|"font-src": \["self"\]|"font-src": ["self", "https://cdn.jsdelivr.net"]|g' svelte.config.js
          sed -i 's|"style-src": \["self", "unsafe-inline"\]|"style-src": ["self", "unsafe-inline", "https://cdn.jsdelivr.net"]|g' svelte.config.js

          sed -i 's|</head>|<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/imjac0b/apple-fonts@latest/SF-Pro/Display/SF-Pro-Display-latin.min.css">\n</head>|g' src/app.html

          sed -i '/@fontsource\/ibm-plex-mono/d' src/routes/+layout.svelte

          sed -i 's|IBM Plex Mono|SF-Pro|g' src/app.css
          sed -i 's|IBM Plex Mono|SF-Pro|g' src/routes/+layout.svelte

      - name: Install Web Dependencies & Build
        working-directory: ./web
        env:
          WEB_DEFAULT_API: "https://cobalt-api.jacob.com.hk"
        run: |
          bun install
          bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
