name: Deploy Cobalt

on:
  push:
    branches: ["main"]

  workflow_dispatch:
  
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Cobalt Repository
        uses: actions/checkout@v4
        with:
          repository: imputnet/cobalt

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Root Dependencies
        run: bun install

      - name: Update API URL in env.ts
        working-directory: ./web
        run: |
          sed -i 's|https://api.cobalt.tools|https://cobalt-api.jacob.com.hk|g' src/lib/env.ts

      - name: Install Web Dependencies & Build
        working-directory: ./web
        run: |
          bun install
          bun run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './web/build'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
